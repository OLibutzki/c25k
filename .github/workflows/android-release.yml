name: Android Release

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: Existing SemVer tag to release, for example 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag format
        env:
          GIT_TAG: ${{ inputs.git_tag }}
        run: |
          if [[ ! "$GIT_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected git_tag in X.Y.Z format, got '$GIT_TAG'" >&2
            exit 1
          fi

      - name: Verify tag exists on origin
        env:
          GIT_TAG: ${{ inputs.git_tag }}
        run: git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" "refs/tags/$GIT_TAG"

      - name: Checkout selected tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.git_tag }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for secret_name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing $secret_name secret" >&2
              missing=1
            fi
          done
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Run unit tests
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
        run: ./gradlew --no-daemon testDebugUnitTest -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Build signed release APK
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon assembleRelease \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            -PreleaseVersionName="${{ inputs.git_tag }}" \
            -PreleaseStoreFile="$RUNNER_TEMP/release.keystore"

      - name: Prepare release asset
        env:
          GIT_TAG: ${{ inputs.git_tag }}
        run: cp app/build/outputs/apk/release/app-release.apk "c25k-coach-$GIT_TAG.apk"

      - name: Fail if GitHub Release already exists
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_TAG: ${{ inputs.git_tag }}
        run: |
          if gh release view "$GIT_TAG" >/dev/null 2>&1; then
            echo "GitHub Release for tag '$GIT_TAG' already exists" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_TAG: ${{ inputs.git_tag }}
        run: |
          gh release create "$GIT_TAG" \
            "c25k-coach-$GIT_TAG.apk" \
            --title "$GIT_TAG" \
            --notes "Signed release APK for $GIT_TAG."

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-release-${{ inputs.git_tag }}
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn
